
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans)}
.dash{padding:20px;min-height:100vh}
.hdr{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px;margin-bottom:20px}
.hdr-left h2{font-size:18px;font-weight:500;color:var(--color-text-primary);margin-bottom:2px}
.hdr-left p{font-size:12px;color:var(--color-text-secondary)}
.filters{display:flex;flex-wrap:wrap;gap:6px}
.fbtn{padding:5px 14px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-secondary);font-size:12px;cursor:pointer;transition:all .15s}
.fbtn.active{background:var(--color-background-info);color:var(--color-text-info);border-color:var(--color-border-info)}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px}
.kpi{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:14px 16px}
.kpi-label{font-size:11px;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.kpi-val{font-size:22px;font-weight:500;color:var(--color-text-primary)}
.kpi-sub{font-size:11px;color:var(--color-text-secondary);margin-top:3px}
.tabs{display:flex;gap:2px;margin-bottom:16px;border-bottom:0.5px solid var(--color-border-tertiary)}
.tab{padding:8px 18px;font-size:13px;border:none;background:transparent;color:var(--color-text-secondary);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-0.5px;transition:all .15s}
.tab.active{color:var(--color-text-info);border-bottom-color:var(--color-text-info)}
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.chart-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:16px}
.chart-card.full{grid-column:1/-1}
.chart-title{font-size:13px;font-weight:500;color:var(--color-text-primary);margin-bottom:12px}
.legend{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:10px;font-size:11px;color:var(--color-text-secondary)}
.leg-item{display:flex;align-items:center;gap:5px}
.leg-sq{width:10px;height:10px;border-radius:2px;flex-shrink:0}
table{width:100%;border-collapse:collapse;font-size:12px}
th{padding:8px 10px;text-align:right;font-weight:500;font-size:11px;color:var(--color-text-secondary);border-bottom:0.5px solid var(--color-border-tertiary)}
th:first-child{text-align:left}
td{padding:8px 10px;text-align:right;border-bottom:0.5px solid var(--color-border-tertiary);color:var(--color-text-primary)}
td:first-child{text-align:left;font-weight:500}
tr:last-child td{border-bottom:none;font-weight:500}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500}
.badge-green{background:var(--color-background-success);color:var(--color-text-success)}
.badge-red{background:var(--color-background-danger);color:var(--color-text-danger)}
.badge-amber{background:var(--color-background-warning);color:var(--color-text-warning)}
.pbar-wrap{display:flex;align-items:center;gap:6px;justify-content:flex-end}
.pbar{width:48px;height:5px;background:var(--color-background-secondary);border-radius:3px;overflow:hidden}
.pbar-fill{height:100%;border-radius:3px}
</style>

<div class="dash">
  <h2 class="sr-only" style="position:absolute;left:-9999px">Order Booking vs Shipped Dashboard FY 2026-27</h2>

  <div class="hdr">
    <div class="hdr-left">
      <h2>Order Booking vs Shipped</h2>
      <p>FY 2026–27 &nbsp;·&nbsp; Status as on 31 May 2026</p>
    </div>
    <div class="filters" id="buyerFilters"></div>
  </div>

  <div class="kpi-grid" id="kpiGrid"></div>

  <div class="tabs" id="tabs">
    <button class="tab active" data-tab="overview">Overview</button>
    <button class="tab" data-tab="quantity">Quantity</button>
    <button class="tab" data-tab="value">Value</button>
    <button class="tab" data-tab="articles">Articles</button>
  </div>

  <div id="tabContent"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const DATA = {
  Myntra:     { bQty:198018, bVal:71291385, sQty:50616,  sVal:17101087, pQty:147402, pVal:54190299 },
  VMM:        { bQty:2456232,bVal:313565807,sQty:670264, sVal:56888658, pQty:1785968,pVal:256677149},
  "V-Mart":   { bQty:189193, bVal:33100952, sQty:89706,  sVal:16136349, pQty:99487,  pVal:16964603 },
  Blackberry: { bQty:3404,   bVal:1600345,  sQty:0,      sVal:0,        pQty:3404,   pVal:1600345  },
  Bewakoof:   { bQty:61980,  bVal:10616980, sQty:0,      sVal:0,        pQty:61980,  pVal:10616980 }
};
const ARTICLES = [
  {buyer:"Myntra",gender:"Men",article:"Jeans",bQ:65122,sQ:6653,pQ:58469},
  {buyer:"Myntra",gender:"Men",article:"Shirts",bQ:19150,sQ:0,pQ:19150},
  {buyer:"Myntra",gender:"Men",article:"Sweatshirt",bQ:16950,sQ:0,pQ:16950},
  {buyer:"Myntra",gender:"Men",article:"Track Pant",bQ:1481,sQ:1481,pQ:0},
  {buyer:"Myntra",gender:"Men",article:"Tshirt",bQ:3362,sQ:2841,pQ:521},
  {buyer:"Myntra",gender:"Women",article:"Tops",bQ:37059,sQ:9415,pQ:27644},
  {buyer:"Myntra",gender:"Women",article:"Tshirt",bQ:21051,sQ:21051,pQ:0},
  {buyer:"Myntra",gender:"Women",article:"Dresses",bQ:8220,sQ:564,pQ:7656},
  {buyer:"Myntra",gender:"Women",article:"Jeans",bQ:8871,sQ:6852,pQ:2019},
  {buyer:"Myntra",gender:"Women",article:"Co-Ords",bQ:4986,sQ:193,pQ:4793},
  {buyer:"VMM",gender:"Men",article:"Tshirt",bQ:405886,sQ:88124,pQ:317762},
  {buyer:"VMM",gender:"Women",article:"Tshirt",bQ:452214,sQ:210602,pQ:241612},
  {buyer:"VMM",gender:"Women",article:"Sweatshirt",bQ:156000,sQ:0,pQ:156000},
  {buyer:"VMM",gender:"Kids",article:"VEST",bQ:288000,sQ:0,pQ:288000},
  {buyer:"VMM",gender:"Kids",article:"Bloomer",bQ:240000,sQ:129306,pQ:110694},
  {buyer:"VMM",gender:"Men",article:"Jeans",bQ:67000,sQ:0,pQ:67000},
  {buyer:"VMM",gender:"Women",article:"Panty",bQ:216000,sQ:84395,pQ:131605},
  {buyer:"VMM",gender:"Kids",article:"Tshirt",bQ:120000,sQ:0,pQ:120000},
  {buyer:"V-Mart",gender:"Men",article:"Tshirt",bQ:138748,sQ:78418,pQ:60330},
  {buyer:"V-Mart",gender:"Men",article:"Jeans",bQ:22076,sQ:11038,pQ:11038},
  {buyer:"V-Mart",gender:"Women",article:"Jeans",bQ:10000,sQ:0,pQ:10000},
  {buyer:"Blackberry",gender:"Men",article:"Shirt",bQ:3404,sQ:0,pQ:3404},
  {buyer:"Bewakoof",gender:"Men",article:"Tshirts",bQ:44480,sQ:0,pQ:44480},
  {buyer:"Bewakoof",gender:"Women",article:"Tshirts",bQ:17500,sQ:0,pQ:17500},
];
const MONTHLY = {
  Myntra:[{m:"Jun",q:66452},{m:"Jul",q:37696},{m:"Aug",q:19881},{m:"Sep",q:23441}],
  VMM:[{m:"Jun",q:1107668},{m:"Jul",q:311500},{m:"Aug",q:322800},{m:"Nov",q:36000}],
  "V-Mart":[{m:"Jun",q:61993}],
  Blackberry:[{m:"Jun",q:3404}],
  Bewakoof:[{m:"Aug",q:24480},{m:"Sep",q:37500}]
};
const BUYERS = Object.keys(DATA);
const BCOLS = {Myntra:"#D4537E",VMM:"#378ADD","V-Mart":"#BA7517",Blackberry:"#1D9E75",Bewakoof:"#E24B4A"};
const COLORS = {booking:"#378ADD",shipped:"#639922",pending:"#E24B4A"};

let selectedBuyer = "All";
let activeTab = "overview";
let charts = {};

function fmtQ(n){if(n>=1e6)return(n/1e6).toFixed(2)+"M";if(n>=1e5)return(n/1e5).toFixed(1)+"L";if(n>=1e3)return(n/1e3).toFixed(1)+"K";return n.toLocaleString("en-IN")}
function fmtV(n){if(n>=1e7)return"₹"+(n/1e7).toFixed(2)+"Cr";if(n>=1e5)return"₹"+(n/1e5).toFixed(1)+"L";return"₹"+n.toLocaleString("en-IN")}

function getActive(){return selectedBuyer==="All"?BUYERS:[selectedBuyer]}

function getKPIs(){
  const b=getActive();
  const bQ=b.reduce((s,k)=>s+DATA[k].bQty,0);
  const bV=b.reduce((s,k)=>s+DATA[k].bVal,0);
  const sQ=b.reduce((s,k)=>s+DATA[k].sQty,0);
  const sV=b.reduce((s,k)=>s+DATA[k].sVal,0);
  const pQ=b.reduce((s,k)=>s+DATA[k].pQty,0);
  const pV=b.reduce((s,k)=>s+DATA[k].pVal,0);
  return{bQ,bV,sQ,sV,pQ,pV,rate:Math.round(sQ/bQ*1000)/10};
}

function destroyCharts(){Object.values(charts).forEach(c=>{try{c.destroy()}catch(e){}});charts={}}

function buildFilters(){
  const d=document.getElementById("buyerFilters");
  d.innerHTML=["All",...BUYERS].map(b=>`<button class="fbtn${selectedBuyer===b?" active":""}" onclick="setBuyer('${b}')">${b}</button>`).join("");
}

function buildKPIs(){
  const k=getKPIs();
  document.getElementById("kpiGrid").innerHTML=`
    <div class="kpi"><div class="kpi-label">Total Booking Qty</div><div class="kpi-val">${fmtQ(k.bQ)}</div><div class="kpi-sub">${fmtV(k.bV)}</div></div>
    <div class="kpi"><div class="kpi-label">Total Shipped Qty</div><div class="kpi-val">${fmtQ(k.sQ)}</div><div class="kpi-sub">${fmtV(k.sV)}</div></div>
    <div class="kpi"><div class="kpi-label">Pending to Ship</div><div class="kpi-val">${fmtQ(k.pQ)}</div><div class="kpi-sub">${fmtV(k.pV)}</div></div>
    <div class="kpi"><div class="kpi-label">Shipment Rate</div><div class="kpi-val">${k.rate}%</div><div class="kpi-sub">qty dispatched</div></div>`;
}

function buildTabs(){
  document.querySelectorAll(".tab").forEach(t=>{
    t.classList.toggle("active",t.dataset.tab===activeTab);
  });
}

function buildOverview(){
  const b=getActive();
  const k=getKPIs();

  // monthly map
  const monthOrder=["Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const mMap={};
  b.forEach(buyer=>(MONTHLY[buyer]||[]).forEach(({m,q})=>{mMap[m]=(mMap[m]||0)+q}));
  const months=monthOrder.filter(m=>mMap[m]);

  // gender map
  const gMap={};
  ARTICLES.filter(a=>b.includes(a.buyer)).forEach(a=>{gMap[a.gender]=(gMap[a.gender]||0)+a.bQ});
  const gLabels=Object.keys(gMap);
  const gVals=gLabels.map(g=>gMap[g]);
  const gColors=["#378ADD","#D4537E","#1D9E75"];

  document.getElementById("tabContent").innerHTML=`
    <div class="charts-grid">
      <div class="chart-card">
        <div class="chart-title">Shipment status (qty)</div>
        <div class="legend">
          <span class="leg-item"><span class="leg-sq" style="background:#639922"></span>Shipped</span>
          <span class="leg-item"><span class="leg-sq" style="background:#E24B4A"></span>Pending</span>
        </div>
        <div style="position:relative;height:200px"><canvas id="cPie" role="img" aria-label="Donut chart: shipped vs pending quantity">Shipped: ${fmtQ(k.sQ)}, Pending: ${fmtQ(k.pQ)}</canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">Booking by gender</div>
        <div class="legend" id="gLeg"></div>
        <div style="position:relative;height:200px"><canvas id="cGender" role="img" aria-label="Donut chart: booking qty by gender">Gender breakdown</canvas></div>
      </div>
      <div class="chart-card full">
        <div class="chart-title">Monthly pending dispatch schedule</div>
        <div style="position:relative;height:200px"><canvas id="cMonth" role="img" aria-label="Bar chart: monthly qty pending dispatch">${months.map(m=>m+": "+fmtQ(mMap[m])).join(", ")}</canvas></div>
      </div>
    </div>`;

  document.getElementById("gLeg").innerHTML=gLabels.map((g,i)=>`<span class="leg-item"><span class="leg-sq" style="background:${gColors[i]}"></span>${g}</span>`).join("");

  charts.pie=new Chart(document.getElementById("cPie"),{type:"doughnut",data:{labels:["Shipped","Pending"],datasets:[{data:[k.sQ,k.pQ],backgroundColor:["#639922","#E24B4A"],borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,cutout:"65%",plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>" "+fmtQ(ctx.raw)}}}}});
  charts.gender=new Chart(document.getElementById("cGender"),{type:"doughnut",data:{labels:gLabels,datasets:[{data:gVals,backgroundColor:gColors,borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,cutout:"60%",plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>" "+fmtQ(ctx.raw)}}}}});
  charts.month=new Chart(document.getElementById("cMonth"),{type:"bar",data:{labels:months,datasets:[{label:"Qty",data:months.map(m=>mMap[m]),backgroundColor:"#378ADD",borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false}},y:{ticks:{callback:v=>fmtQ(v)}}}}});
}

function buildQuantity(){
  const rows=BUYERS.map(b=>{const d=DATA[b];const r=Math.round(d.sQty/d.bQty*1000)/10;return{b,d,r}});
  document.getElementById("tabContent").innerHTML=`
    <div class="charts-grid">
      <div class="chart-card full">
        <div class="chart-title">Booking vs shipped vs pending — by buyer (qty)</div>
        <div class="legend">
          <span class="leg-item"><span class="leg-sq" style="background:#378ADD"></span>Booking</span>
          <span class="leg-item"><span class="leg-sq" style="background:#639922"></span>Shipped</span>
          <span class="leg-item"><span class="leg-sq" style="background:#E24B4A"></span>Pending</span>
        </div>
        <div style="position:relative;height:260px"><canvas id="cBuyerQ" role="img" aria-label="Grouped bar chart: booking vs shipped vs pending qty by buyer">Buyer qty comparison</canvas></div>
      </div>
      <div class="chart-card full">
        <div class="chart-title">Buyer-wise summary</div>
        <table>
          <thead><tr><th>Buyer</th><th>Booking qty</th><th>Shipped qty</th><th>Pending qty</th><th>Ship rate</th></tr></thead>
          <tbody>
            ${rows.map(({b,d,r})=>`<tr>
              <td>${b}</td>
              <td>${fmtQ(d.bQty)}</td>
              <td>${fmtQ(d.sQty)}</td>
              <td>${fmtQ(d.pQty)}</td>
              <td><span class="badge ${r>50?"badge-green":r>20?"badge-amber":"badge-red"}">${r}%</span></td>
            </tr>`).join("")}
            <tr style="border-top:0.5px solid var(--color-border-secondary)">
              <td>Grand total</td>
              <td>${fmtQ(BUYERS.reduce((s,b)=>s+DATA[b].bQty,0))}</td>
              <td>${fmtQ(BUYERS.reduce((s,b)=>s+DATA[b].sQty,0))}</td>
              <td>${fmtQ(BUYERS.reduce((s,b)=>s+DATA[b].pQty,0))}</td>
              <td><span class="badge badge-amber">27.9%</span></td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>`;
  charts.bQ=new Chart(document.getElementById("cBuyerQ"),{type:"bar",data:{labels:BUYERS,datasets:[{label:"Booking",data:BUYERS.map(b=>DATA[b].bQty),backgroundColor:"#378ADD",borderRadius:3},{label:"Shipped",data:BUYERS.map(b=>DATA[b].sQty),backgroundColor:"#639922",borderRadius:3},{label:"Pending",data:BUYERS.map(b=>DATA[b].pQty),backgroundColor:"#E24B4A",borderRadius:3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false}},y:{ticks:{callback:v=>fmtQ(v)}}}}});
}

function buildValue(){
  document.getElementById("tabContent").innerHTML=`
    <div class="charts-grid">
      <div class="chart-card full">
        <div class="chart-title">Booking vs shipped vs pending value — by buyer</div>
        <div class="legend">
          <span class="leg-item"><span class="leg-sq" style="background:#378ADD"></span>Booking</span>
          <span class="leg-item"><span class="leg-sq" style="background:#639922"></span>Shipped</span>
          <span class="leg-item"><span class="leg-sq" style="background:#E24B4A"></span>Pending</span>
        </div>
        <div style="position:relative;height:260px"><canvas id="cBuyerV" role="img" aria-label="Grouped bar chart: booking vs shipped vs pending value by buyer">Buyer value comparison</canvas></div>
      </div>
      <div class="chart-card full">
        <div class="chart-title">Value breakdown</div>
        <table>
          <thead><tr><th>Buyer</th><th>Booking value</th><th>Shipped value</th><th>Pending value</th><th>% pending</th></tr></thead>
          <tbody>
            ${BUYERS.map(b=>{const d=DATA[b];const pct=Math.round(d.pVal/d.bVal*100);return`<tr>
              <td>${b}</td><td>${fmtV(d.bVal)}</td><td>${fmtV(d.sVal)}</td><td>${fmtV(d.pVal)}</td>
              <td><div class="pbar-wrap"><div class="pbar"><div class="pbar-fill" style="width:${pct}%;background:#E24B4A"></div></div><span style="font-size:11px;color:var(--color-text-secondary)">${pct}%</span></div></td>
            </tr>`}).join("")}
            <tr><td>Grand total</td><td>${fmtV(BUYERS.reduce((s,b)=>s+DATA[b].bVal,0))}</td><td>${fmtV(BUYERS.reduce((s,b)=>s+DATA[b].sVal,0))}</td><td>${fmtV(BUYERS.reduce((s,b)=>s+DATA[b].pVal,0))}</td><td style="color:var(--color-text-secondary);font-size:12px">79.1%</td></tr>
          </tbody>
        </table>
      </div>
    </div>`;
  charts.bV=new Chart(document.getElementById("cBuyerV"),{type:"bar",data:{labels:BUYERS,datasets:[{label:"Booking",data:BUYERS.map(b=>DATA[b].bVal),backgroundColor:"#378ADD",borderRadius:3},{label:"Shipped",data:BUYERS.map(b=>DATA[b].sVal),backgroundColor:"#639922",borderRadius:3},{label:"Pending",data:BUYERS.map(b=>DATA[b].pVal),backgroundColor:"#E24B4A",borderRadius:3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false}},y:{ticks:{callback:v=>fmtV(v)}}}}});
}

function buildArticles(){
  const b=getActive();
  const aMap={};
  ARTICLES.filter(a=>b.includes(a.buyer)).forEach(a=>{
    if(!aMap[a.article])aMap[a.article]={bQ:0,sQ:0,pQ:0};
    aMap[a.article].bQ+=a.bQ;aMap[a.article].sQ+=a.sQ;aMap[a.article].pQ+=a.pQ;
  });
  const top=Object.entries(aMap).sort((a,b)=>b[1].bQ-a[1].bQ).slice(0,9);
  const labels=top.map(([k])=>k);
  const h=Math.max(320,labels.length*44+80);
  document.getElementById("tabContent").innerHTML=`
    <div class="charts-grid">
      <div class="chart-card full">
        <div class="chart-title">Top articles — booking vs shipped vs pending</div>
        <div class="legend">
          <span class="leg-item"><span class="leg-sq" style="background:#378ADD"></span>Booking</span>
          <span class="leg-item"><span class="leg-sq" style="background:#639922"></span>Shipped</span>
          <span class="leg-item"><span class="leg-sq" style="background:#E24B4A"></span>Pending</span>
        </div>
        <div style="position:relative;height:${h}px"><canvas id="cArt" role="img" aria-label="Horizontal bar chart: top articles by booking qty">${labels.join(", ")}</canvas></div>
      </div>
    </div>`;
  charts.art=new Chart(document.getElementById("cArt"),{type:"bar",data:{labels,datasets:[{label:"Booking",data:top.map(([,v])=>v.bQ),backgroundColor:"#378ADD",borderRadius:3},{label:"Shipped",data:top.map(([,v])=>v.sQ),backgroundColor:"#639922",borderRadius:3},{label:"Pending",data:top.map(([,v])=>v.pQ),backgroundColor:"#E24B4A",borderRadius:3}]},options:{indexAxis:"y",responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{callback:v=>fmtQ(v)}},y:{grid:{display:false}}}}});
}

function render(){
  buildFilters();buildKPIs();buildTabs();
  destroyCharts();
  if(activeTab==="overview")buildOverview();
  else if(activeTab==="quantity")buildQuantity();
  else if(activeTab==="value")buildValue();
  else buildArticles();
}

window.setBuyer=function(b){selectedBuyer=b;render()}

document.getElementById("tabs").addEventListener("click",e=>{
  if(e.target.dataset.tab){activeTab=e.target.dataset.tab;render()}
});

render();
</script>
